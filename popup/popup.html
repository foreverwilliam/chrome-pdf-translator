<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>PDF Translator 设置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 350px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    h1 {
      font-size: 16px;
      margin-bottom: 16px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #8899aa;
      margin-bottom: 6px;
      font-weight: 500;
    }

    select, input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px 12px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    select:focus, input:focus {
      border-color: #533483;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 18px;
    }

    button {
      flex: 1;
      padding: 9px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.85;
    }

    .btn-save {
      background: #e94560;
      color: white;
    }

    .btn-open {
      background: #533483;
      color: white;
    }

    .msg {
      margin-top: 12px;
      font-size: 12px;
      color: #53d8a8;
      text-align: center;
      min-height: 18px;
    }

    .hint {
      font-size: 11px;
      color: #556;
      margin-top: 4px;
      line-height: 1.4;
    }

    .model-group {
      display: none;
    }

    .model-group.visible {
      display: block;
    }

    .custom-group {
      display: none;
    }

    .custom-group.visible {
      display: block;
    }

    .format-switch {
      display: flex;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 6px;
      overflow: hidden;
    }

    .format-option {
      flex: 1;
      padding: 7px 12px;
      background: transparent;
      color: #8899aa;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
      text-align: center;
    }

    .format-option:first-child {
      border-right: 1px solid #0f3460;
    }

    .format-option.active {
      background: #533483;
      color: #fff;
    }

    .format-option:hover:not(.active) {
      background: rgba(83, 52, 131, 0.3);
      color: #c0c0d0;
    }

    hr {
      border: none;
      border-top: 1px solid #0f3460;
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <h1>📄 PDF Translator</h1>

  <div class="form-group">
    <label for="provider">翻译服务</label>
    <select id="provider">
      <option value="deepl">DeepL</option>
      <option value="openai">OpenAI (GPT)</option>
      <option value="deepseek">DeepSeek</option>
      <option value="custom">自定义 API</option>
    </select>
  </div>

  <div class="form-group custom-group" id="custom-format-group">
    <label>API 格式</label>
    <div class="format-switch" id="format-switch">
      <button class="format-option active" data-format="openai">OpenAI</button>
      <button class="format-option" data-format="anthropic">Anthropic</button>
    </div>
    <div class="hint" id="format-hint">OpenAI Chat Completions 兼容格式</div>
  </div>

  <div class="form-group custom-group" id="custom-url-group">
    <label for="custom-url">API 端点 URL</label>
    <input type="text" id="custom-url" placeholder="https://your-api.com（自动拼接路径）">
    <div class="hint">填写完整的 Chat Completions 接口地址（兼容 OpenAI 格式）</div>
  </div>

  <div class="form-group">
    <label for="api-key">API Key</label>
    <input type="password" id="api-key" placeholder="输入你的 API Key">
    <div class="hint" id="key-hint">DeepL Free Key 以 :fx 结尾</div>
  </div>

  <div class="form-group model-group" id="model-group">
    <label for="model">模型</label>
    <select id="model">
      <option value="gpt-4o">GPT-4o (推荐)</option>
      <option value="gpt-4o-mini">GPT-4o-mini (更快更便宜)</option>
      <option value="gpt-4-turbo">GPT-4 Turbo</option>
    </select>
  </div>

  <div class="form-group custom-group" id="custom-model-group">
    <label for="custom-model">模型名称</label>
    <input type="text" id="custom-model" placeholder="例如: qwen-turbo, claude-3-sonnet, glm-4">
    <div class="hint">填写模型 ID，需与 API 供应商支持的模型名称一致</div>
  </div>

  <div class="btn-row">
    <button class="btn-save" id="save-btn">保存设置</button>
    <button class="btn-open" id="open-btn">打开翻译器</button>
  </div>

  <div class="msg" id="msg"></div>

  <hr>

  <div class="hint" style="text-align:center; color: #667;">
    使用方法：保存 API Key → 点击"打开翻译器"→ 加载 PDF → 翻译
  </div>

  <script src="popup.js"></script>
</body>
</html>
